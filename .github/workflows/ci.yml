name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate-pr-template:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate pull request template usage
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request?.body || "";
            const requiredSections = [
              "## Description",
              "## Type of Change",
              "## Related Issues",
              "## Testing",
              "## Screenshots (if applicable)",
              "## Checklist",
            ];

            const requiredChecklistItems = [
              "- [ ] Code follows style guidelines",
              "- [ ] Tests added/updated",
              "- [ ] Documentation updated",
              "- [ ] No breaking changes (or documented)",
            ];

            const missingSections = requiredSections.filter((section) => !body.includes(section));
            const missingChecklistItems = requiredChecklistItems.filter((item) => !body.includes(item));

            const sectionContent = (heading) => {
              const escaped = heading.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
              const regex = new RegExp(`${escaped}\\s*\\n([\\s\\S]*?)(\\n##\\s|$)`, "i");
              const match = body.match(regex);
              return match ? match[1].trim() : "";
            };

            const description = sectionContent("## Description");
            const testing = sectionContent("## Testing");
            const hasCheckedBox = /- \[x\] /i.test(body);

            const errors = [];
            if (missingSections.length) {
              errors.push(`Missing required section(s): ${missingSections.join(", ")}`);
            }
            if (missingChecklistItems.length) {
              errors.push(`Missing required checklist item(s): ${missingChecklistItems.join(", ")}`);
            }
            if (!description || /brief summary|brief description/i.test(description)) {
              errors.push("`## Description` must be filled with project-specific details.");
            }
            if (!testing || /list exact commands and outcomes|describe how you tested/i.test(testing)) {
              errors.push("`## Testing` must include concrete test commands or verification steps.");
            }
            if (!hasCheckedBox) {
              errors.push("At least one checklist item must be checked (`- [x]`).");
            }

            if (errors.length) {
              core.setFailed(
                [
                  "Pull request description does not match the required template:",
                  ...errors.map((error) => `- ${error}`),
                  "",
                  "Please copy `.github/pull_request_template.md` and complete each section."
                ].join("\n")
              );
            } else {
              core.info("PR template validation passed.");
            }

  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run Ruff linter
        run: uv run ruff check .

      - name: Run Ruff formatter check
        run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run Django checks
        run: uv run python manage.py check
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: "True"
          ALLOWED_HOSTS: localhost,127.0.0.1
          AWS_ACCESS_KEY_ID: test-key
          AWS_SECRET_ACCESS_KEY: test-secret
          AWS_MEDIA_BUCKET_NAME: test-bucket

      - name: Run migrations
        run: uv run python manage.py migrate --noinput
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: "True"
          ALLOWED_HOSTS: localhost,127.0.0.1
          AWS_ACCESS_KEY_ID: test-key
          AWS_SECRET_ACCESS_KEY: test-secret
          AWS_MEDIA_BUCKET_NAME: test-bucket

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run Bandit security check
        run: uv run bandit -r apps config -f json -o bandit-report.json || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
