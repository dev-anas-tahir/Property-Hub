{% load static %}

<button
  hx-post="{% url 'properties:favorite_toggle' property.pk %}"
  hx-swap="outerHTML"
  class="btn btn-circle btn-sm border-0 bg-white/90 shadow-soft transition-all duration-200 hover:bg-white"
>
  <span class="htmx-indicator loading loading-spinner loading-xs"></span>

  <svg
    class="w-4 h-4 transition-colors duration-200 htmx-indicator-hide {{ property.is_favorited|yesno:'text-error fill-current,text-base-content/60' }}"
    fill="{% if property.is_favorited %}currentColor{% else %}none{% endif %}"
    stroke="currentColor"
    viewBox="0 0 24 24"
  >
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="2"
      d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
    ></path>
  </svg>
</button>
