<!DOCTYPE html>
{% load static tailwind_cli %}
<html lang="en" data-theme="realmkey">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RealmKey{% endblock %}</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{% static 'images/favicon.svg' %}">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS with DaisyUI -->
    {% tailwind_css %}

    <!-- HTMX -->
    <script
      src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.10/dist/htmx.min.js"
      integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5xLSi8nO7UC"
      crossorigin="anonymous"
      defer
    ></script>

    <!-- Alpine.js -->
    <script
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"
      integrity="sha384-Rpe/8orFUm5Q1GplYBHxbuA8Az8O8C5sAoOsdbRWkqPjKFaxPgGZipj4zeHL7lxX"
      crossorigin="anonymous"
      defer
    ></script>

    {% block extra_head %}{% endblock %}
</head>

<body class="min-h-screen bg-base-200"
      hx-headers='{"x-csrftoken": "{{ csrf_token }}"}'
      hx-on:htmx:before-request="this.classList.add('htmx-loading')"
      hx-on:htmx:after-request="this.classList.remove('htmx-loading')">
    <!-- Navigation -->
    <c-navigation.navbar />

    <!-- Messages -->
    {% if messages %}
        <c-ui.messages />
    {% endif %}

    <!-- Main Content -->
    <main class="{% block main_class %}container mx-auto px-4 py-8{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <c-navigation.footer />

    {% block extra_scripts %}{% endblock %}
</body>

</html>
