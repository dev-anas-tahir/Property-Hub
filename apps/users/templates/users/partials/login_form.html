{% load static %}

<form method="post" class="space-y-6">
    {% csrf_token %}

    <!-- Form Errors -->
    {% if form.non_field_errors %}
        <div class="alert alert-error">
            <c-ui.icon name="exclamation-circle" classes="h-6 w-6" />
            <div>
                {% for error in form.non_field_errors %}
                    <div>{{ error }}</div>
                {% endfor %}
            </div>
        </div>
    {% endif %}

    <!-- Email Field -->
    <c-forms.field :field="form.email" label="Email" placeholder="Enter your email" icon="at-symbol" required />

    <!-- Password Field -->
    <c-forms.field :field="form.password" label="Password" placeholder="Enter your password" required />

    <!-- Remember Me -->
    <div class="flex items-center justify-between">
        <label class="label cursor-pointer">
            <input type="checkbox" name="remember_me" class="checkbox checkbox-primary checkbox-sm mr-2">
            <span class="label-text">Remember me</span>
        </label>
        <a href="#" class="link link-primary text-sm">Forgot password?</a>
    </div>

    <!-- Submit Button -->
    <button type="submit" class="btn btn-primary w-full">
        <c-ui.icon name="login" classes="h-5 w-5 mr-2" />
        Sign In
    </button>
</form>
