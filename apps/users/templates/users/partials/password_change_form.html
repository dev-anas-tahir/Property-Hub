<form method="post" class="space-y-6">
    {% csrf_token %}

    {% if form.non_field_errors %}
        <div class="alert alert-error">
            <c-ui.icon name="exclamation-circle" classes="h-6 w-6" />
            <div>
                {% for error in form.non_field_errors %}
                    <div>{{ error }}</div>
                {% endfor %}
            </div>
        </div>
    {% endif %}

    <c-forms.field :field="form.old_password" label="Current Password" placeholder="Enter your current password" required />
    <c-forms.field :field="form.new_password1" label="New Password" placeholder="Enter your new password" required />
    <c-forms.field :field="form.new_password2" label="Confirm New Password" placeholder="Confirm your new password" required />

    <div class="flex justify-end space-x-4">
        <a href="{% url 'users:profile' %}" class="btn btn-outline">Cancel</a>
        <button type="submit" class="btn btn-primary">
            <c-ui.icon name="key" classes="h-5 w-5 mr-2" />
            Change Password
        </button>
    </div>
</form>
