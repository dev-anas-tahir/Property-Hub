{% load static %}

<form method="post" class="space-y-6">
    {% csrf_token %}

    <!-- Form Errors -->
    {% if form.non_field_errors %}
        <div class="alert alert-error">
            <c-ui.icon name="exclamation-circle" classes="h-6 w-6" />
            <div>
                {% for error in form.non_field_errors %}
                    <div>{{ error }}</div>
                {% endfor %}
            </div>
        </div>
    {% endif %}

    <!-- Name Fields -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <c-forms.field :field="form.first_name" label="First Name" placeholder="Enter your first name" required />
        <c-forms.field :field="form.last_name" label="Last Name" placeholder="Enter your last name" required />
    </div>

    <!-- Email Field -->
    <c-forms.field :field="form.email" label="Email" placeholder="Enter your email" icon="at-symbol" required />

    <!-- Submit Button -->
    <div class="flex justify-end space-x-4">
        <a href="{% url 'users:profile' %}" class="btn btn-outline">Cancel</a>
        <button type="submit" class="btn btn-primary">
            <c-ui.icon name="check" classes="h-5 w-5 mr-2" />
            Update Profile
        </button>
    </div>
</form>
