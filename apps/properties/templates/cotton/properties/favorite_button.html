{% load static %}
<c-vars property />

<button
  hx-post="{% url 'properties:favorite_toggle' property.pk %}"
  hx-swap="outerHTML"
  class="btn btn-circle btn-sm border-0 bg-white/90 shadow-soft transition-all duration-200 hover:bg-white"
>
  <span class="htmx-indicator loading loading-spinner loading-xs"></span>

  <c-ui.icon
    name="heart"
    variant="{% if property.is_favorited %}solid{% else %}outline{% endif %}"
    classes="h-4 w-4 transition-colors duration-200 htmx-indicator-hide {{ property.is_favorited|yesno:'text-error,text-base-content/60' }}"
  />
</button>
